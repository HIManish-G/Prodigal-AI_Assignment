
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }

#app {
  display: flex;
  flex-direction: column;
  height: 600px;
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  overflow: hidden;
}

#header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 20px;
  border-bottom: 0.5px solid var(--color-border-tertiary);
  background: var(--color-background-primary);
}

#header-icon {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--color-background-secondary);
  border: 0.5px solid var(--color-border-tertiary);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

#header-icon i { font-size: 16px; color: var(--color-text-secondary); }

#header-text { flex: 1; }
#header-name { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
#header-sub { font-size: 12px; color: var(--color-text-tertiary); }

#stage-pill {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 20px;
  border: 0.5px solid var(--color-border-tertiary);
  color: var(--color-text-secondary);
  background: var(--color-background-secondary);
  font-weight: 500;
  letter-spacing: 0.02em;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}

#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: var(--color-border-tertiary); border-radius: 2px; }

.msg {
  display: flex;
  flex-direction: column;
  max-width: 80%;
  gap: 3px;
  animation: fadeUp 0.2s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.agent { align-self: flex-start; }
.msg.user { align-self: flex-end; }

.msg-label {
  font-size: 11px;
  color: var(--color-text-tertiary);
  padding: 0 4px;
}

.msg.user .msg-label { text-align: right; }

.bubble {
  padding: 9px 13px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.5;
  border: 0.5px solid var(--color-border-tertiary);
}

.msg.agent .bubble {
  background: var(--color-background-secondary);
  color: var(--color-text-primary);
  border-bottom-left-radius: 4px;
}

.msg.user .bubble {
  background: var(--color-background-primary);
  color: var(--color-text-primary);
  border-bottom-right-radius: 4px;
}

.typing {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 10px 13px;
  background: var(--color-background-secondary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: 14px;
  border-bottom-left-radius: 4px;
  width: fit-content;
}

.dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--color-text-tertiary);
  animation: blink 1.2s infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.9); }
  40% { opacity: 1; transform: scale(1); }
}

#status-bar {
  display: flex;
  gap: 8px;
  padding: 8px 20px;
  border-top: 0.5px solid var(--color-border-tertiary);
  border-bottom: 0.5px solid var(--color-border-tertiary);
  background: var(--color-background-secondary);
  overflow-x: auto;
}

#status-bar::-webkit-scrollbar { display: none; }

.status-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--color-text-tertiary);
  white-space: nowrap;
  flex-shrink: 0;
}

.status-chip i { font-size: 13px; }
.status-chip.done { color: var(--color-text-success); }
.status-chip.pending { color: var(--color-text-secondary); }

#input-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  background: var(--color-background-primary);
}

#msg-input {
  flex: 1;
  border: 0.5px solid var(--color-border-secondary);
  border-radius: 20px;
  padding: 8px 14px;
  font-size: 14px;
  font-family: var(--font-sans);
  background: var(--color-background-secondary);
  color: var(--color-text-primary);
  resize: none;
  outline: none;
  line-height: 1.4;
  max-height: 80px;
}

#msg-input:focus {
  border-color: var(--color-border-primary);
}

#msg-input::placeholder { color: var(--color-text-tertiary); }

#send-btn {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 0.5px solid var(--color-border-secondary);
  background: var(--color-background-secondary);
  color: var(--color-text-secondary);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s, border-color 0.15s;
}

#send-btn:hover { background: var(--color-background-tertiary); border-color: var(--color-border-primary); }
#send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
#send-btn i { font-size: 15px; }

#notice {
  text-align: center;
  font-size: 11px;
  color: var(--color-text-tertiary);
  padding: 6px 16px 10px;
}

.txn-card {
  background: var(--color-background-secondary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-md);
  padding: 10px 13px;
  font-size: 12px;
  color: var(--color-text-secondary);
  margin-top: 4px;
}

.txn-card .txn-id {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--color-text-success);
  margin-top: 4px;
}
</style>

<h2 class="sr-only">Payment collection agent chat interface</h2>

<div id="app">
  <div id="header">
    <div id="header-icon"><i class="ti ti-shield-check" aria-hidden="true"></i></div>
    <div id="header-text">
      <div id="header-name">Niki</div>
      <div id="header-sub">Secure payment assistant</div>
    </div>
    <div id="stage-pill">connecting...</div>
  </div>

  <div id="messages"></div>

  <div id="status-bar">
    <div class="status-chip pending" id="chip-account"><i class="ti ti-user" aria-hidden="true"></i> Account</div>
    <div class="status-chip pending" id="chip-verify"><i class="ti ti-id" aria-hidden="true"></i> Identity</div>
    <div class="status-chip pending" id="chip-amount"><i class="ti ti-currency-rupee" aria-hidden="true"></i> Amount</div>
    <div class="status-chip pending" id="chip-card"><i class="ti ti-credit-card" aria-hidden="true"></i> Card</div>
    <div class="status-chip pending" id="chip-confirm"><i class="ti ti-circle-check" aria-hidden="true"></i> Confirm</div>
  </div>

  <div id="input-row">
    <textarea id="msg-input" placeholder="Type a message..." rows="1"></textarea>
    <button id="send-btn" aria-label="Send message"><i class="ti ti-arrow-up" aria-hidden="true"></i></button>
  </div>
  <div id="notice"><i class="ti ti-lock" aria-hidden="true" style="font-size:11px; vertical-align:-1px;"></i> End-to-end encrypted · sensitive data is never stored</div>
</div>

<script>
const API = 'http://localhost:8000';
let sessionId = null;
let busy = false;

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const stagePill = document.getElementById('stage-pill');

const STAGE_LABELS = {
  INIT: 'Starting',
  AWAIT_ACCOUNT_ID: 'Account ID',
  AWAIT_NAME: 'Name',
  AWAIT_SECONDARY: 'Verification',
  AWAIT_AMOUNT: 'Amount',
  AWAIT_CARD: 'Card details',
  CONFIRM_PAYMENT: 'Confirming',
  DONE: 'Complete',
  LOCKED_OUT: 'Locked',
  ERROR: 'Error',
};

const CHIP_STAGES = {
  'chip-account': ['AWAIT_NAME','AWAIT_SECONDARY','AWAIT_AMOUNT','AWAIT_CARD','CONFIRM_PAYMENT','DONE'],
  'chip-verify':  ['AWAIT_AMOUNT','AWAIT_CARD','CONFIRM_PAYMENT','DONE'],
  'chip-amount':  ['AWAIT_CARD','CONFIRM_PAYMENT','DONE'],
  'chip-card':    ['CONFIRM_PAYMENT','DONE'],
  'chip-confirm': ['DONE'],
};

function updateChips(stage) {
  stagePill.textContent = STAGE_LABELS[stage] || stage;
  for (const [id, stages] of Object.entries(CHIP_STAGES)) {
    const el = document.getElementById(id);
    const done = stages.includes(stage);
    el.className = 'status-chip ' + (done ? 'done' : 'pending');
    const icon = el.querySelector('i');
    if (done) {
      icon.className = 'ti ti-check';
    } else {
      const origIcons = { 'chip-account': 'ti-user', 'chip-verify': 'ti-id', 'chip-amount': 'ti-currency-rupee', 'chip-card': 'ti-credit-card', 'chip-confirm': 'ti-circle-check' };
      icon.className = 'ti ' + origIcons[id];
    }
  }
}

function addMessage(role, text, meta) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'agent' ? 'Niki' : 'You';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  wrap.appendChild(label);
  wrap.appendChild(bubble);
  if (meta && meta.txn_id) {
    const card = document.createElement('div');
    card.className = 'txn-card';
    card.innerHTML = 'Transaction confirmed <div class="txn-id">' + meta.txn_id + '</div>';
    wrap.appendChild(card);
  }
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  const el = document.createElement('div');
  el.className = 'msg agent';
  el.id = 'typing-indicator';
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = 'Niki';
  const dots = document.createElement('div');
  dots.className = 'typing';
  dots.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  el.appendChild(label);
  el.appendChild(dots);
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function extractTxn(text) {
  const m = text.match(/txn_[a-z0-9_]+/i);
  return m ? m[0] : null;
}

async function startSession() {
  busy = true;
  sendBtn.disabled = true;
  showTyping();
  try {
    const r = await fetch(API + '/sessions', { method: 'POST' });
    if (!r.ok) throw new Error('Could not reach the agent server.');
    const data = await r.json();
    sessionId = data.session_id;
    removeTyping();
    addMessage('agent', data.message);
    updateChips('AWAIT_ACCOUNT_ID');
  } catch (e) {
    removeTyping();
    addMessage('agent', 'Unable to connect to the payment server. Please ensure it is running on localhost:8000.');
    stagePill.textContent = 'Offline';
  }
  busy = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || busy || !sessionId) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  addMessage('user', text);
  busy = true;
  sendBtn.disabled = true;
  showTyping();
  try {
    const r = await fetch(API + '/chat/' + sessionId, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    const data = await r.json();
    removeTyping();
    const txn = extractTxn(data.message);
    addMessage('agent', data.message, txn ? { txn_id: txn } : null);
    updateChips(data.stage);
    if (data.terminal) {
      inputEl.disabled = true;
      sendBtn.disabled = true;
      inputEl.placeholder = 'Conversation ended.';
    }
  } catch (e) {
    removeTyping();
    addMessage('agent', 'Something went wrong. Please try again.');
  }
  busy = false;
  if (!inputEl.disabled) sendBtn.disabled = false;
}

sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 80) + 'px';
});

startSession();
</script>
