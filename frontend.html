<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niki · Payment Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #f2f1ee;
  --surface:      #fafaf8;
  --border:       #e4e3de;
  --border2:      #cccbc5;
  --text:         #181816;
  --muted:        #6a6a64;
  --hint:         #a0a099;
  --accent:       #1a6b47;
  --accent-glow:  rgba(26, 107, 71, 0.15);
  --accent-light: #eef5f0;
  --user-bg:      #181816;
  --user-text:    #f2f1ee;
  --agent-bg:     #ffffff;
  --chip-done:    #1a6b47;
  --chip-done-bg: #eef5f0;
  --send-active:  #181816;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg:           #111110;
    --surface:      #1a1a18;
    --border:       #2a2a27;
    --border2:      #3d3d39;
    --text:         #f0efe9;
    --muted:        #9e9d97;
    --hint:         #5a5a55;
    --accent:       #3dba7e;
    --accent-glow:  rgba(61, 186, 126, 0.12);
    --accent-light: #0d2a1c;
    --user-bg:      #f0efe9;
    --user-text:    #111110;
    --agent-bg:     #222220;
    --chip-done:    #3dba7e;
    --chip-done-bg: #0d2a1c;
    --send-active:  #f0efe9;
  }
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 16px;
}

/* subtle background grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.35;
  pointer-events: none;
}

#app {
  width: 100%;
  max-width: 500px;
  height: 700px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow:
    0 1px 2px rgba(0,0,0,0.04),
    0 4px 16px rgba(0,0,0,0.06),
    0 0 0 1px rgba(255,255,255,0.5) inset;
  animation: rise 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
  position: relative;
  z-index: 1;
}

@keyframes rise {
  from { opacity: 0; transform: translateY(16px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── Header ─────────────────────────────────────────────── */
#header {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}

#avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--accent-light);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  position: relative;
}
#avatar i { font-size: 17px; color: var(--accent); }
#avatar::after {
  content: '';
  position: absolute;
  bottom: 1px; right: 1px;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--surface);
}

#header-text { flex: 1; }
#header-name { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
#header-sub  { font-size: 11.5px; color: var(--hint); margin-top: 1px; }

#stage-pill {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  color: var(--muted);
  background: var(--bg);
  font-weight: 500;
  transition: all 0.3s ease;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.02em;
}
#stage-pill.active {
  color: var(--accent);
  background: var(--accent-light);
  border-color: var(--accent-glow);
}

/* ── Progress chips ──────────────────────────────────────── */
#progress {
  display: flex;
  gap: 5px;
  padding: 9px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  overflow-x: auto;
}
#progress::-webkit-scrollbar { display: none; }

.chip {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--hint);
  white-space: nowrap;
  flex-shrink: 0;
  padding: 3px 9px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  cursor: default;
}
.chip i { font-size: 11px; }
.chip.done {
  color: var(--chip-done);
  background: var(--chip-done-bg);
  border-color: transparent;
  transform: scale(1.04);
}
.chip.done i { animation: pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); }

@keyframes pop {
  0%   { transform: scale(0.6) rotate(-10deg); opacity: 0; }
  60%  { transform: scale(1.3) rotate(4deg); }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

/* ── Messages ────────────────────────────────────────────── */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 18px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scroll-behavior: smooth;
}
#messages::-webkit-scrollbar { width: 3px; }
#messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.msg {
  display: flex;
  flex-direction: column;
  max-width: 80%;
  gap: 3px;
  animation: msgIn 0.28s cubic-bezier(0.22, 1, 0.36, 1) both;
}
.msg.agent { align-self: flex-start; }
.msg.user  { align-self: flex-end; }

@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.msg-label { font-size: 10.5px; color: var(--hint); padding: 0 6px; font-weight: 500; letter-spacing: 0.02em; }
.msg.user .msg-label { text-align: right; }

.bubble {
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 13.5px;
  line-height: 1.6;
  color: var(--text);
  border: 1px solid var(--border);
  position: relative;
}
.msg.agent .bubble {
  background: var(--agent-bg);
  border-bottom-left-radius: 4px;
}
.msg.user .bubble {
  background: var(--user-bg);
  color: var(--user-text);
  border-color: transparent;
  border-bottom-right-radius: 4px;
}

/* accent left bar on agent messages */
.msg.agent .bubble::before {
  content: '';
  position: absolute;
  left: -1px; top: 12px; bottom: 12px;
  width: 2px;
  background: var(--accent);
  border-radius: 2px;
  opacity: 0.5;
}

.txn-card {
  margin-top: 5px;
  padding: 9px 13px;
  background: var(--chip-done-bg);
  border-radius: 10px;
  font-size: 12px;
  color: var(--chip-done);
  border: 1px solid rgba(26,107,71,0.15);
}
.txn-id {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  margin-top: 4px;
  opacity: 0.75;
  letter-spacing: 0.04em;
}

/* ── Typing indicator ────────────────────────────────────── */
.typing {
  display: flex; align-items: center; gap: 5px;
  padding: 11px 14px;
  background: var(--agent-bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  border-bottom-left-radius: 4px;
  width: fit-content;
}
.dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--hint);
  animation: bounce 1.1s infinite ease-in-out;
}
.dot:nth-child(1) { animation-delay: 0s; }
.dot:nth-child(2) { animation-delay: 0.18s; }
.dot:nth-child(3) { animation-delay: 0.36s; }
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0);    opacity: 0.35; }
  30%            { transform: translateY(-5px); opacity: 1; }
}

/* ── Input row ───────────────────────────────────────────── */
#input-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  padding: 10px 14px 11px;
  border-top: 1px solid var(--border);
  background: var(--surface);
}

#msg-input {
  flex: 1;
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 9px 14px;
  font-size: 13.5px;
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  resize: none;
  outline: none;
  line-height: 1.5;
  max-height: 90px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
#msg-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
#msg-input::placeholder { color: var(--hint); }
#msg-input:disabled { opacity: 0.45; cursor: not-allowed; }

#send-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none;
  background: var(--send-active);
  color: var(--bg);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.15s;
  position: relative;
  overflow: hidden;
}
#send-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  opacity: 0;
  transition: opacity 0.15s;
}
#send-btn:hover:not(:disabled) { transform: scale(1.1); }
#send-btn:hover:not(:disabled)::after { opacity: 1; }
#send-btn:active:not(:disabled) { transform: scale(0.93); }
#send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
#send-btn i { font-size: 15px; position: relative; z-index: 1; }

#notice {
  text-align: center;
  font-size: 10.5px;
  color: var(--hint);
  padding: 0 16px 10px;
  letter-spacing: 0.01em;
}
#notice i { font-size: 10px; vertical-align: -1px; }
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div id="avatar"><i class="ti ti-shield-check"></i></div>
    <div id="header-text">
      <div id="header-name">Niki</div>
      <div id="header-sub">Secure payment assistant</div>
    </div>
    <div id="stage-pill">connecting…</div>
  </div>

  <div id="progress">
    <div class="chip" id="chip-account"><i class="ti ti-user"></i> Account</div>
    <div class="chip" id="chip-verify"><i class="ti ti-id"></i> Identity</div>
    <div class="chip" id="chip-amount"><i class="ti ti-currency-rupee"></i> Amount</div>
    <div class="chip" id="chip-card"><i class="ti ti-credit-card"></i> Card</div>
    <div class="chip" id="chip-confirm"><i class="ti ti-circle-check"></i> Confirm</div>
  </div>

  <div id="messages"></div>

  <div id="input-row">
    <textarea id="msg-input" placeholder="Type a message…" rows="1"></textarea>
    <button id="send-btn" aria-label="Send"><i class="ti ti-arrow-up"></i></button>
  </div>
  <div id="notice"><i class="ti ti-lock"></i> End-to-end encrypted · sensitive data is never stored</div>
</div>

<script>
const API = 'http://localhost:8000';
let sessionId = null;
let busy = false;

const messagesEl = document.getElementById('messages');
const inputEl    = document.getElementById('msg-input');
const sendBtn    = document.getElementById('send-btn');
const stagePill  = document.getElementById('stage-pill');

// ── Audio: short synthetic click using Web Audio API ──────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function playClick(type = 'send') {
  try {
    if (!audioCtx) audioCtx = new AudioCtx();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    if (type === 'send') {
      osc.frequency.setValueAtTime(600, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.06);
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
    } else {
      // receive — lower, softer
      osc.frequency.setValueAtTime(440, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(320, audioCtx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    }
    osc.type = 'sine';
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.2);
  } catch {}
}

// ── Stage labels & chip config ────────────────────────────────────────────
const STAGE_LABELS = {
  INIT: 'Starting', AWAIT_ACCOUNT_ID: 'Account ID',
  AWAIT_NAME: 'Name', AWAIT_SECONDARY: 'Verification',
  AWAIT_AMOUNT: 'Amount', AWAIT_CARD: 'Card details',
  CONFIRM_PAYMENT: 'Confirming', DONE: 'Complete',
  LOCKED_OUT: 'Locked', ERROR: 'Error',
};

const CHIP_DONE_AT = {
  'chip-account': ['AWAIT_NAME','AWAIT_SECONDARY','AWAIT_AMOUNT','AWAIT_CARD','CONFIRM_PAYMENT','DONE'],
  'chip-verify':  ['AWAIT_AMOUNT','AWAIT_CARD','CONFIRM_PAYMENT','DONE'],
  'chip-amount':  ['AWAIT_CARD','CONFIRM_PAYMENT','DONE'],
  'chip-card':    ['CONFIRM_PAYMENT','DONE'],
  'chip-confirm': ['DONE'],
};

const CHIP_ICONS = {
  'chip-account': 'ti-user', 'chip-verify': 'ti-id',
  'chip-amount': 'ti-currency-rupee', 'chip-card': 'ti-credit-card',
  'chip-confirm': 'ti-circle-check',
};

function updateChips(stage) {
  const label = STAGE_LABELS[stage] || stage;
  stagePill.textContent = label;
  stagePill.classList.toggle('active', !['connecting…','Starting'].includes(label));

  for (const [id, stages] of Object.entries(CHIP_DONE_AT)) {
    const el   = document.getElementById(id);
    const icon = el.querySelector('i');
    const wasDone = el.classList.contains('done');
    const done = stages.includes(stage);
    if (done && !wasDone) {
      // re-trigger animation by cloning the icon
      el.className = 'chip done';
      const newIcon = icon.cloneNode(true);
      newIcon.className = 'ti ti-check';
      icon.replaceWith(newIcon);
    } else if (!done) {
      el.className = 'chip';
      icon.className = 'ti ' + CHIP_ICONS[id];
    }
  }
}

function addMessage(role, text, txnId) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'agent' ? 'Niki' : 'You';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  wrap.appendChild(label);
  wrap.appendChild(bubble);

  if (txnId) {
    const card = document.createElement('div');
    card.className = 'txn-card';
    card.innerHTML = '✓ Payment confirmed<div class="txn-id">' + txnId + '</div>';
    wrap.appendChild(card);
  }

  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  playClick(role === 'agent' ? 'receive' : 'send');
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg agent';
  wrap.id = 'typing';
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = 'Niki';
  const dots = document.createElement('div');
  dots.className = 'typing';
  dots.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  wrap.appendChild(label);
  wrap.appendChild(dots);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function extractTxn(text) {
  const m = text.match(/txn_[a-z0-9_]+/i);
  return m ? m[0] : null;
}

function lockInput(placeholder) {
  inputEl.disabled = true;
  sendBtn.disabled = true;
  inputEl.placeholder = placeholder || 'Conversation ended.';
  stagePill.classList.remove('active');
}

async function startSession() {
  busy = true;
  sendBtn.disabled = true;
  showTyping();
  try {
    const r = await fetch(API + '/sessions', { method: 'POST' });
    if (!r.ok) throw new Error();
    const data = await r.json();
    sessionId = data.session_id;
    removeTyping();
    addMessage('agent', data.message);
    updateChips('AWAIT_ACCOUNT_ID');
  } catch {
    removeTyping();
    addMessage('agent', 'Could not connect to the payment server. Make sure it is running on localhost:8000.');
    lockInput('Offline');
  }
  busy = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || busy || !sessionId) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';

  // Send button micro-animation
  sendBtn.style.transform = 'scale(0.88)';
  setTimeout(() => sendBtn.style.transform = '', 120);

  addMessage('user', text);
  busy = true;
  sendBtn.disabled = true;
  showTyping();
  try {
    const r = await fetch(API + '/chat/' + sessionId, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    const data = await r.json();
    removeTyping();
    addMessage('agent', data.message, extractTxn(data.message));
    updateChips(data.stage);
    if (data.terminal) lockInput();
  } catch {
    removeTyping();
    addMessage('agent', 'Something went wrong. Please try again.');
  }
  busy = false;
  if (!inputEl.disabled) sendBtn.disabled = false;
}

sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 90) + 'px';
});

startSession();
</script>
</body>
</html>
